name: CI

# Valida testes + build sem publicar. Roda em qualquer PR e pode ser
# disparado manualmente (aba Actions → Run workflow) em qualquer branch.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Auditoria de segurança das dependências. Não bloqueia o PR
      # (continue-on-error) — apenas expõe vulnerabilidades altas/críticas
      # na aba Actions; o Dependabot é quem abre os PRs de correção.
      - run: npm audit --audit-level=high
        continue-on-error: true

      - run: npm test          # cálculos verificados

      - run: npm run build     # confirma que compila (sem deploy)
